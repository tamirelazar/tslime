repos:
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: clippy
        args: [--all-targets, --all-features, --, "-D", "warnings"]
  - repo: local
    hooks:
      - id: tree-clean
        name: no dev-meta paths tracked
        entry: scripts/check_tree_clean.sh
        language: system
        pass_filenames: false
        always_run: true
