[package]
name = "tslime"
version = "0.1.0"
edition = "2021"

[dependencies]
crossterm = "0.27"
clap = { version = "4.4", features = ["derive"] }
rand = "0.8"
rand_xoshiro = "0.6"
signal-hook = "0.3"
serde_json = "1.0"

[target.'cfg(windows)'.dependencies]
enable-ansi-support = "0.2.1"

[profile.release]
lto = true
codegen-units = 1
strip = true
panic = "abort"
